#################################
#     GLX backend
#################################
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
vsync = true;
xrender-sync-fence = "true";
glx-swap-method = -1;


#################################
#       Rounded Corner
#################################
corner-radius = 10

#################################
#       Shadows
#################################
shadow = false;
shadow-radius = 5;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.2;
shadow-ignore-shaped = false;

#################################
#       Opacity
#################################
inactive-opacity = 0.8;
active-opacity = 1;
frame-opacity = 0.8;
inactive-opacity-override = false;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
blur-kern = "3x3box";
/* blur-method = "kawase"; */
blur-strength = 10;
opacity-rule = [ 
  "100:class_g = 'vlc'",
  "99:class_g = 'Libreoffice-writer'",
  "99:class_g = 'Libreoffice-calc'",
  "99:class_g = 'Libreoffice-impress'",
  "80:class_g = 'Gnome-terminal'",
  "80:class_g = 'Nautilus'",
  "90:class_g = 'code-oss'",
  "70:class_g = 'i3bar'",
  "100:class_g = 'Google-chrome'",
  "90:class_g = 'St'",
  "90:class_g = 'Alacritty'",
  "90:class_g = 'kitty'",
  "100:class_g = 'mpv'",
  "100:class_g = 'Brave-browser'",
];

#################################
#       Fading
#################################
fading = false;

wintypes:
{
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
}
